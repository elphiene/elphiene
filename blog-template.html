<!doctype html>
<html lang="en-AU">
    <head>
        <title>POST TITLE ✩</title>
        <link rel="icon" type="image/x-icon" href="images/favicon.png" />
        <link rel="stylesheet" href="style.css" />
        <meta charset="UTF-8" />
        <meta name="description" content="Elphiene's blog - POST TITLE" />
        <meta name="keywords" content="HTML, CSS, Elphiene's blog" />
        <meta name="author" content="Elphiene" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+SC&display=swap"
            rel="stylesheet"
        />
        <script type="text/javascript">
            (function () {
                let title = "POST TITLE ✩ ";
                let position = 0;
                function scrolltitle() {
                    document.title =
                        title.substring(position, title.length) +
                        title.substring(0, position);
                    position++;
                    if (position > title.length) position = 0;
                    window.setTimeout(scrolltitle, 170);
                }
                scrolltitle();
            })();
        </script>
    </head>
    <body>
        <header>
            <img
                id="headerscroll"
                src="images/elphiene-header.gif"
                alt="Elphiene header banner"
            />
        </header>
        <ul>
            <li>
                <a href="index.html"><b>home</b></a>
            </li>
            <li>
                <a href="blog.html"><b>blog</b></a>
            </li>
            <li>
                <a href="other-stuff.html"><b>other stuff</b></a>
            </li>
        </ul>

        <div class="blog-post-title-bar">
            <h2>POST TITLE</h2>
            <a href="blog.html"
                ><img src="images/back.gif" alt="back to blog"
            /></a>
        </div>

        <div class="blog-post-layout">
            <div class="blog-post-text">
                <p>Write your blog post content here.</p>
                <p>Each paragraph gets its own p tag.</p>
            </div>
            <div class="blog-post-aside">
                <!-- Optional: date, images, gifs, notes -->
                <!-- Remove this div entirely if you don't need a sidebar -->
                <p>DATE HERE</p>
            </div>
        </div>

        <div id="comments-section">
            <h3>comments</h3>
            <div id="comments-list"></div>
            <form id="comment-form">
                <input type="text" id="comment-name" placeholder="name" maxlength="50" required />
                <textarea id="comment-message" placeholder="leave a comment!" maxlength="500" required></textarea>
                <button type="submit">submit</button>
                <p id="comment-status"></p>
            </form>
        </div>
        <script>
            (function () {
                const WORKER =
                    "https://elphiene-guestbook.headsinthecloudsmct.workers.dev";
                const slug =
                    location.pathname
                        .replace(/^\//, "")
                        .replace(/\.html$/, "") || "blog";

                function esc(s) {
                    return s
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;")
                        .replace(/"/g, "&quot;");
                }

                async function loadComments() {
                    const list = document.getElementById("comments-list");
                    try {
                        const res = await fetch(
                            `${WORKER}/comments?post=${encodeURIComponent(slug)}`
                        );
                        const data = await res.json();
                        if (!data.length) {
                            list.innerHTML =
                                "<p style='opacity:0.5'>no comments yet. be the first!</p>";
                            return;
                        }
                        list.innerHTML = data
                            .map(
                                (c) =>
                                    `<div class="comment-entry">` +
                                    `<strong>${esc(c.name)}</strong>` +
                                    `<span class="comment-date">${new Date(c.created_at).toLocaleDateString("en-AU")}</span>` +
                                    `<p>${esc(c.message)}</p>` +
                                    `</div>`
                            )
                            .join("");
                    } catch {
                        list.innerHTML =
                            "<p style='opacity:0.5'>couldn't load comments.</p>";
                    }
                }

                document
                    .getElementById("comment-form")
                    .addEventListener("submit", async function (e) {
                        e.preventDefault();
                        const name = document
                            .getElementById("comment-name")
                            .value.trim();
                        const message = document
                            .getElementById("comment-message")
                            .value.trim();
                        const status =
                            document.getElementById("comment-status");
                        status.textContent = "submitting...";
                        try {
                            const res = await fetch(`${WORKER}/comment`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    post: slug,
                                    name,
                                    message,
                                }),
                            });
                            if (res.ok) {
                                status.textContent = "comment posted!";
                                document
                                    .getElementById("comment-form")
                                    .reset();
                                loadComments();
                            } else {
                                status.textContent = await res.text();
                            }
                        } catch {
                            status.textContent = "something went wrong :(";
                        }
                    });

                loadComments();
            })();
        </script>

            <img src="images/favicon.png" height="20px" alt="favicon" />

            <a href="mailto:el@elphiene.com">el@elphiene.com</a>

        </div>
    </body>
</html>
